; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1-n16r8]
platform = espressif32
framework = arduino
monitor_speed = 115200
board = esp32-s3-devkitm-1
build_flags =
	-D BOARD_HAS_PSRAM
	-D LV_CONF_INCLUDE_SIMPLE
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D TOUCH_CS=-1
	-I src/
	; Uncomment the line below once a camera module (e.g. OV2640) is
	; wired up per camera_engine.cpp's pin map. Without it, all camera
	; and OCR features compile to safe no-op stubs.
	; -D CAMERA_MODULE_ENABLED
src_filter =
	+<*>
	-<ui_tabs_reader.cpp>
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
lib_deps =
	lvgl/lvgl@8.3.11
	bodmer/TFT_eSPI@^2.5.43
	https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	https://github.com/me-no-dev/AsyncTCP.git
	; ElegantOTA is intentionally excluded to avoid WebServer / AsyncWebServer
	; HTTP enum collisions. OTA is handled via the SD bootloader or /ota upload.
	bblanchon/ArduinoJson@^7.0.4
	; Added for camera_engine.cpp's base64::encode() call when sending
	; JPEG frames to the Gemini/OpenAI vision endpoints
	densaugeo/base64@^1.4.0
	; esp32-camera (esp_camera.h) ships bundled with the espressif32
	; Arduino core on most recent releases; if your installed core
	; predates that bundling, uncomment the line below.
	; espressif/esp32-camera@^2.0.4
	;
	; Note: audio_engine.cpp uses driver/i2s.h, which ships with the
	; espressif32 Arduino core — no extra library_deps entry needed
	; for I2S mic recording / speaker playback.
	;
	; IMPORTANT — LVGL and ElegantOTA are pinned to EXACT versions
	; (no ^ caret) on purpose:
	;  - lvgl 8.3.11: all UI code in this project (ui_engine.cpp,
	;    reader_ui.cpp) targets the LVGL 8.x display/input driver API
	;    (lv_disp_drv_t, lv_indev_drv_t, lv_canvas_set_px_color, the
	;    lv_color_t.ch union member, LV_IMG_CF_TRUE_COLOR, etc).
	;    LVGL 9 renamed/removed all of this (lv_display_t, new canvas
	;    API, lv_color32_t, ...). A caret range let the resolver pull
	;    9.5.0 last build, which is why nothing compiled.
	;  - ElegantOTA 2.2.9: ElegantOTA runs in its DEFAULT synchronous
	;    WebServer mode here (see ota_manager.cpp on port 81),
	;    deliberately kept separate from network.cpp's AsyncWebServer
	;    dashboard (port 80). Do not try to merge them onto one
	;    server or one translation unit — WebServer.h's http_method
	;    enum and ESPAsyncWebServer.h's WebRequestMethod enum both
	;    define unscoped HTTP_GET/HTTP_POST/etc at global scope, and
	;    two unscoped enums sharing enumerator names in the same
	;    translation unit is a hard C++ redefinition error. Versions
	;    3.x of ElegantOTA also dropped AsyncWebServer support
	;    entirely, so stay on the 2.x line regardless.
	; Do not relax these to ^-ranges without re-checking the API.